<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
 body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color:aqua;
            margin: 0;
           padding: 0;
          height: 100vh;
          background-image: url("IP-management-and-strategy-hero-5000x2500px.avif"); 
         background-size: cover;               
         background-position: center;          
         background-repeat: no-repeat;        
        }
        img{
                  width:150px;
        
        
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input[type="submit"] {
            width: 95%;
            padding: 10px;
            background: #3a7bd5;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #2f69c2;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
        }

        .footer a {
            text-decoration: none;
            color: #3a7bd5;
        }
</style>
</head>
<body>
<center>
 <div class="login-box">
        <h2>Employment Management System</h2>
        <img src="images.png" >

        <form action="add.jsp" method="post">
           <input type="text" name="id" placeholder="Enter ID" required>
<input type="text" name="nm" placeholder="Enter Name" required>
<input type="text" name="eml" placeholder="Enter Email" required>
<input type="text" name="sal" placeholder="Enter Salary" required>
<input type="password" name="pas" placeholder="Enter Password" required>
            <input type="submit" value="Login"><br><br>
             
        </form>
        
        <div class="footer">
            <a href="#">Forgot Password?</a>
        </div>
    </div>
        
</center>

 </div>

</body>
</html>
